<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style type="text/css">
      .title { font-family: "Microsoft YaHei", sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .label { font-family: "Microsoft YaHei", sans-serif; font-size: 12px; fill: #333; }
      .actor { stroke: #667eea; stroke-width: 2; fill: white; }
      .usecase { stroke: #667eea; stroke-width: 2; fill: #f5f7fa; }
      .line { stroke: #999; stroke-width: 1; }
    </style>
  </defs>
  
  <text x="300" y="25" text-anchor="middle" class="title">学生用户用例图</text>
  
  <ellipse cx="300" cy="200" rx="35" ry="50" class="actor"/>
  <circle cx="300" cy="165" r="15" class="actor"/>
  <text x="300" y="275" text-anchor="middle" class="label">学生用户</text>
  
  <ellipse cx="120" cy="80" rx="50" ry="25" class="usecase"/>
  <text x="120" y="85" text-anchor="middle" class="label">登录注册</text>
  
  <ellipse cx="120" cy="160" rx="50" ry="25" class="usecase"/>
  <text x="120" y="165" text-anchor="middle" class="label">快递查询</text>
  
  <ellipse cx="120" cy="240" rx="50" ry="25" class="usecase"/>
  <text x="120" y="245" text-anchor="middle" class="label">我的快递</text>
  
  <ellipse cx="120" cy="320" rx="50" ry="25" class="usecase"/>
  <text x="120" y="325" text-anchor="middle" class="label">取件预约</text>
  
  <ellipse cx="480" cy="80" rx="50" ry="25" class="usecase"/>
