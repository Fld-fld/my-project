  <ellipse cx="480" cy="160" rx="50" ry="25" class="usecase"/>
  <text x="480" y="165" text-anchor="middle" class="label">个人中心</text>
  
  <ellipse cx="480" cy="240" rx="50" ry="25" class="usecase"/>
  <text x="480" y="245" text-anchor="middle" class="label">预约管理</text>
  
  <line x1="265" y1="200" x2="70" y2="80" class="line"/>
  <line x1="265" y1="200" x2="70" y2="160" class="line"/>
  <line x1="265" y1="200" x2="70" y2="240" class="line"/>
  <line x1="265" y1="200" x2="70" y2="320" class="line"/>
  
  <line x1="335" y1="200" x2="430" y2="80" class="line"/>
  <line x1="335" y1="200" x2="430" y2="160" class="line"/>
  <line x1="335" y1="200" x2="430" y2="240" class="line"/>
